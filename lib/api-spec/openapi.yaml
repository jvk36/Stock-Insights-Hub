openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Stock Research Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stock
    description: Stock data operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stock/{symbol}/quote:
    get:
      operationId: getStockQuote
      tags: [stock]
      summary: Get stock quote and summary stats
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock quote data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockQuote"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/chart:
    get:
      operationId: getStockChart
      tags: [stock]
      summary: Get stock price chart data
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [1d, 5d, 1mo, 3mo, 6mo, 1y, 2y, 5y, max]
            default: 1y
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartData"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/news:
    get:
      operationId: getStockNews
      tags: [stock]
      summary: Get news for a stock
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: News items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/profile:
    get:
      operationId: getStockProfile
      tags: [stock]
      summary: Get company profile
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfile"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/financials:
    get:
      operationId: getStockFinancials
      tags: [stock]
      summary: Get financial statements
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [quarterly, annual]
            default: quarterly
      responses:
        "200":
          description: Financial statements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialStatements"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/earnings-history:
    get:
      operationId: getEarningsHistory
      tags: [stock]
      summary: Get historical quarterly EPS data for earnings overlay
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Earnings history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsHistoryResponse"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/insider-transactions:
    get:
      operationId: getInsiderTransactions
      tags: [stock]
      summary: Get insider transactions (Form 4) for a company
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Insider transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsiderTransactionsResponse"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/fundamentals:
    get:
      operationId: getStockFundamentals
      tags: [stock]
      summary: Get fundamental analysis summary (4 pillars)
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fundamental summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundamentalSummary"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/analysis:
    get:
      operationId: getStockAnalysis
      tags: [stock]
      summary: Get DCF inputs and MOAT analysis data (5 years)
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analysis data including DCF inputs and MOAT metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAnalysis"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/models:
    get:
      operationId: getStockModels
      tags: [stock]
      summary: Get raw data for valuation models (Graham, EV/EBIT, DDM)
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Valuation model input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockModels"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{symbol}/sec-filings:
    get:
      operationId: getSecFilings
      tags: [stock]
      summary: Get SEC filings for a company
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SEC filings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecFilingsResponse"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    StockQuote:
      type: object
      properties:
        symbol:
          type: string
        shortName:
          type: string
        longName:
          type: string
        currentPrice:
          type: number
          nullable: true
        previousClose:
          type: number
          nullable: true
        open:
          type: number
          nullable: true
        dayHigh:
          type: number
          nullable: true
        dayLow:
          type: number
          nullable: true
        fiftyTwoWeekHigh:
          type: number
          nullable: true
        fiftyTwoWeekLow:
          type: number
          nullable: true
        volume:
          type: number
          nullable: true
        averageVolume:
          type: number
          nullable: true
        marketCap:
          type: number
          nullable: true
        enterpriseValue:
          type: number
          nullable: true
        trailingPE:
          type: number
          nullable: true
        forwardPE:
          type: number
          nullable: true
        dividendYield:
          type: number
          nullable: true
        beta:
          type: number
          nullable: true
        priceToBook:
          type: number
          nullable: true
        netDebt:
          type: number
          nullable: true
        totalDebt:
          type: number
          nullable: true
        totalCash:
          type: number
          nullable: true
        revenueGrowth:
          type: number
          nullable: true
        earningsGrowth:
          type: number
          nullable: true
        profitMargins:
          type: number
          nullable: true
        changePercent:
          type: number
          nullable: true
        change:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        exchange:
          type: string
          nullable: true
      required:
        - symbol
        - shortName

    ChartDataPoint:
      type: object
      properties:
        date:
          type: string
        open:
          type: number
          nullable: true
        high:
          type: number
          nullable: true
        low:
          type: number
          nullable: true
        close:
          type: number
          nullable: true
        volume:
          type: number
          nullable: true
      required:
        - date

    ChartData:
      type: object
      properties:
        symbol:
          type: string
        range:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
      required:
        - symbol
        - range
        - data

    NewsItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        publisher:
          type: string
        link:
          type: string
        publishedAt:
          type: string
        thumbnail:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
      required:
        - id
        - title
        - publisher
        - link
        - publishedAt

    NewsResponse:
      type: object
      properties:
        symbol:
          type: string
        news:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"
      required:
        - symbol
        - news

    CompanyProfile:
      type: object
      properties:
        symbol:
          type: string
        longName:
          type: string
        sector:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        employees:
          type: number
          nullable: true
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
      required:
        - symbol
        - longName

    FinancialPeriod:
      type: object
      properties:
        date:
          type: string
        data:
          type: object
          additionalProperties:
            type: number
            nullable: true
      required:
        - date
        - data

    FinancialStatements:
      type: object
      properties:
        symbol:
          type: string
        period:
          type: string
        incomeStatement:
          type: array
          items:
            $ref: "#/components/schemas/FinancialPeriod"
        balanceSheet:
          type: array
          items:
            $ref: "#/components/schemas/FinancialPeriod"
        cashFlow:
          type: array
          items:
            $ref: "#/components/schemas/FinancialPeriod"
      required:
        - symbol
        - period
        - incomeStatement
        - balanceSheet
        - cashFlow

    EarningsHistoryItem:
      type: object
      properties:
        date:
          type: string
        epsActual:
          type: number
          nullable: true
        epsEstimate:
          type: number
          nullable: true
        ttmEps:
          type: number
          nullable: true
      required:
        - date

    EarningsHistoryResponse:
      type: object
      properties:
        symbol:
          type: string
        peMultiple:
          type: number
        history:
          type: array
          items:
            $ref: "#/components/schemas/EarningsHistoryItem"
      required:
        - symbol
        - peMultiple
        - history

    InsiderTransaction:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        insiderName:
          type: string
        title:
          type: string
          nullable: true
        isDirector:
          type: boolean
        isOfficer:
          type: boolean
        isTenPercentOwner:
          type: boolean
        transactionCode:
          type: string
        transactionType:
          type: string
        signalLevel:
          type: string
        shares:
          type: number
          nullable: true
        pricePerShare:
          type: number
          nullable: true
        totalValue:
          type: number
          nullable: true
        ownership:
          type: string
        natureOfOwnership:
          type: string
          nullable: true
        is10b51Plan:
          type: boolean
        accessionNumber:
          type: string
        formUrl:
          type: string
      required:
        - id
        - date
        - insiderName
        - isDirector
        - isOfficer
        - isTenPercentOwner
        - transactionCode
        - transactionType
        - signalLevel
        - ownership
        - is10b51Plan
        - accessionNumber
        - formUrl

    InsiderTransactionsResponse:
      type: object
      properties:
        symbol:
          type: string
        cik:
          type: string
          nullable: true
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/InsiderTransaction"
      required:
        - symbol
        - transactions

    FundamentalMetric:
      type: object
      properties:
        value:
          type: number
          nullable: true
        rating:
          type: string
          nullable: true
        formatted:
          type: string
          nullable: true
      required:
        - value
        - rating
        - formatted

    FundamentalTrendPoint:
      type: object
      properties:
        year:
          type: string
        value:
          type: number
          nullable: true
      required:
        - year
        - value

    FundamentalSummary:
      type: object
      properties:
        symbol:
          type: string
        profitability:
          type: object
          properties:
            roe:
              $ref: "#/components/schemas/FundamentalMetric"
            roic:
              $ref: "#/components/schemas/FundamentalMetric"
            grossMarginTrend:
              type: array
              items:
                $ref: "#/components/schemas/FundamentalTrendPoint"
            grossMarginRating:
              type: string
              nullable: true
            ccc:
              $ref: "#/components/schemas/FundamentalMetric"
          required:
            - roe
            - roic
            - grossMarginTrend
            - grossMarginRating
            - ccc
        valuation:
          type: object
          properties:
            evToEbitda:
              $ref: "#/components/schemas/FundamentalMetric"
            fcfYield:
              $ref: "#/components/schemas/FundamentalMetric"
            priceToTangibleBook:
              $ref: "#/components/schemas/FundamentalMetric"
          required:
            - evToEbitda
            - fcfYield
            - priceToTangibleBook
        solvency:
          type: object
          properties:
            netDebtToEbitda:
              $ref: "#/components/schemas/FundamentalMetric"
            interestCoverage:
              $ref: "#/components/schemas/FundamentalMetric"
            currentRatio:
              $ref: "#/components/schemas/FundamentalMetric"
            quickRatio:
              $ref: "#/components/schemas/FundamentalMetric"
          required:
            - netDebtToEbitda
            - interestCoverage
            - currentRatio
            - quickRatio
        qualitative:
          type: object
          properties:
            insiderOwnership:
              $ref: "#/components/schemas/FundamentalMetric"
            rdAsPercentRevenue:
              $ref: "#/components/schemas/FundamentalMetric"
            shareCountTrend:
              type: array
              items:
                $ref: "#/components/schemas/FundamentalTrendPoint"
            shareCountChange5y:
              $ref: "#/components/schemas/FundamentalMetric"
          required:
            - insiderOwnership
            - rdAsPercentRevenue
            - shareCountTrend
            - shareCountChange5y
      required:
        - symbol
        - profitability
        - valuation
        - solvency
        - qualitative

    GrahamEpsRow:
      type: object
      properties:
        year:
          type: string
        eps:
          type: number
          nullable: true
      required:
        - year

    EvEbitHistoryRow:
      type: object
      properties:
        year:
          type: string
        ebit:
          type: number
          nullable: true
        revenue:
          type: number
          nullable: true
        totalDebt:
          type: number
          nullable: true
        cash:
          type: number
          nullable: true
        minorityInterest:
          type: number
          nullable: true
        ev:
          type: number
          nullable: true
      required:
        - year

    DdmDividendRow:
      type: object
      properties:
        year:
          type: string
        dps:
          type: number
        eps:
          type: number
          nullable: true
      required:
        - year
        - dps

    GrahamData:
      type: object
      properties:
        epsHistory:
          type: array
          items:
            $ref: "#/components/schemas/GrahamEpsRow"
        currentPrice:
          type: number
          nullable: true
        trailingEps:
          type: number
          nullable: true
      required:
        - epsHistory

    EvEbitData:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/EvEbitHistoryRow"
        currentEv:
          type: number
          nullable: true
        sharesOutstanding:
          type: number
          nullable: true
      required:
        - history

    DdmData:
      type: object
      properties:
        dividendHistory:
          type: array
          items:
            $ref: "#/components/schemas/DdmDividendRow"
        beta:
          type: number
          nullable: true
        currentPrice:
          type: number
          nullable: true
        trailingEps:
          type: number
          nullable: true
        payoutRatio:
          type: number
          nullable: true
        trailingDividendRate:
          type: number
          nullable: true
      required:
        - dividendHistory

    StockModels:
      type: object
      properties:
        graham:
          $ref: "#/components/schemas/GrahamData"
        evEbit:
          $ref: "#/components/schemas/EvEbitData"
        ddm:
          $ref: "#/components/schemas/DdmData"
      required:
        - graham
        - evEbit
        - ddm

    DcfInputs:
      type: object
      properties:
        freeCashFlow:
          type: number
          nullable: true
        sharesOutstanding:
          type: number
          nullable: true
        netDebt:
          type: number
          nullable: true
        currentPrice:
          type: number
          nullable: true
        dataYear:
          type: string
      required:
        - dataYear

    MoatRow:
      type: object
      properties:
        year:
          type: string
        grossMargin:
          type: number
          nullable: true
        sgaMargin:
          type: number
          nullable: true
        daRatio:
          type: number
          nullable: true
        interestRatio:
          type: number
          nullable: true
        taxRate:
          type: number
          nullable: true
        netMargin:
          type: number
          nullable: true
        capexRatio:
          type: number
          nullable: true
        liabToEquity:
          type: number
          nullable: true
        roe:
          type: number
          nullable: true
      required:
        - year

    StockAnalysis:
      type: object
      properties:
        dcfInputs:
          $ref: "#/components/schemas/DcfInputs"
        moatRows:
          type: array
          items:
            $ref: "#/components/schemas/MoatRow"
      required:
        - dcfInputs
        - moatRows

    SecFiling:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        filedAt:
          type: string
        url:
          type: string
        documentUrl:
          type: string
          nullable: true
      required:
        - id
        - type
        - description
        - filedAt
        - url

    SecFilingsResponse:
      type: object
      properties:
        symbol:
          type: string
        cik:
          type: string
          nullable: true
        filings:
          type: array
          items:
            $ref: "#/components/schemas/SecFiling"
      required:
        - symbol
        - filings
