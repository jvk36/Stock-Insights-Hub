kind = "web"
previewPath = "/"
title = "Stock Research Platform"
version = "1.0.0"
id = "artifacts/stock-research"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20359

[services.development]
run = "pnpm --filter @workspace/stock-research run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stock-research", "run", "build" ]
publicDir = "artifacts/stock-research/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20359"
BASE_PATH = "/"
